services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: scemas
      POSTGRES_PASSWORD: scemas
      POSTGRES_DB: scemas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scemas']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
