name = "scemas-pager"
main = "src/worker.ts"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "PAGER"
class_name = "PagerRoom"

[[migrations]]
tag = "v1"
new_classes = ["PagerRoom"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[placement]
mode = "smart"
